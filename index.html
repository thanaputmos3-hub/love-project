<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffd6e7, #ffeaf4);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100dvh;
    overflow: hidden;
}

.box {
    background: white;
    padding: 42px 34px;
    border-radius: 32px;
    text-align: center;
    width: 90%;
    max-width: 460px;
    box-shadow: 0 22px 55px rgba(255, 105, 180, 0.25);
    animation: fadeIn 0.8s ease;
    position: relative;
    z-index: 2;
}

h1 {
    color: #ff5fa2;
    font-size: 30px;
    line-height: 1.35;
    margin-bottom: 14px;
}

p {
    color: #555;
    font-size: 17px;
    margin-bottom: 24px;
}

.gift {
    font-size: 90px;
    cursor: pointer;
    margin: 18px 0;
    animation: bounce 1.2s infinite;
}

.gift.opened {
    animation: openGift 0.7s ease forwards;
}

.hidden {
    display: none;
}

textarea {
    width: 100%;
    height: 135px;
    border-radius: 18px;
    border: 2px solid #ffd1e6;
    padding: 15px;
    font-size: 16px;
    outline: none;
    resize: none;
    font-family: 'Segoe UI', sans-serif;
}

textarea:focus {
    border-color: #ff7eb3;
}

button {
    margin-top: 18px;
    background: linear-gradient(135deg, #ff7eb3, #ff4f8b);
    border: none;
    color: white;
    padding: 14px;
    width: 100%;
    border-radius: 25px;
    font-size: 17px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.04);
}

.result {
    margin-top: 18px;
    color: #ff5fa2;
    font-weight: bold;
}

.heart, .confetti {
    position: absolute;
    z-index: 1;
    pointer-events: none;
}

.heart {
    animation: float 6s linear forwards;
    opacity: 0.75;
}

.confetti {
    top: -20px;
    animation: fall 3s linear forwards;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
}

@keyframes openGift {
    0% { transform: scale(1) rotate(0); }
    40% { transform: scale(1.2) rotate(-10deg); }
    70% { transform: scale(1.1) rotate(10deg); }
    100% { transform: scale(0); opacity: 0; }
}

@keyframes float {
    0% { transform: translateY(100vh) scale(1); opacity: 0; }
    25% { opacity: 1; }
    100% { transform: translateY(-15vh) scale(1.5); opacity: 0; }
}

@keyframes fall {
    to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.92); }
    to { opacity: 1; transform: scale(1); }
}

@media (max-width: 600px) {
    .box {
        max-width: 360px;
        padding: 30px 20px;
    }

    h1 { font-size: 24px; }
    p { font-size: 15px; }
    .gift { font-size: 82px; }
    textarea { height: 120px; font-size: 15px; }
}
</style>
</head>

<body>

<div class="box" id="giftBox">
    <h1>มีของขวัญให้คุณพิม 🎁</h1>
    <p>กดเปิดดูหน่อยนะ...</p>
    <div class="gift" id="gift" onclick="openGift()">🎁</div>
</div>

<div class="box hidden" id="messageBox">
    <h1 id="typeTitle"></h1>
    <p id="typeText"></p>

    <textarea id="msg" placeholder="เล่าให้เราฟังหน่อย วันนี้เป็นยังไงบ้าง... 💌"></textarea>
    <button onclick="sendMsg()">ส่งความในใจ 💝</button>
    <div class="result" id="result"></div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbzrgKhCJb8qPqzuX9LwY54sZtXUmUaI4svRlstb1QvNeHlsMBIjsOUacwz-QkcMzoDBVA/exec";

function openGift() {
    const gift = document.getElementById("gift");
    gift.classList.add("opened");

    createConfetti();
    createHearts(30);

    setTimeout(() => {
        document.getElementById("giftBox").classList.add("hidden");
        document.getElementById("messageBox").classList.remove("hidden");

        typeWriter("เป็นกำลังใจให้คุณพิมนะครับ 💖", "typeTitle", 55, () => {
            typeWriter("คนที่น่ารักของผม 🥺💘", "typeText", 60);
        });
    }, 750);
}

function typeWriter(text, elementId, speed, callback) {
    const el = document.getElementById(elementId);
    el.innerHTML = "";
    let i = 0;

    const timer = setInterval(() => {
        el.innerHTML += text.charAt(i);
        i++;

        if (i >= text.length) {
            clearInterval(timer);
            if (callback) callback();
        }
    }, speed);
}

function sendMsg() {
    const msg = document.getElementById("msg").value;
    const result = document.getElementById("result");

    if (!msg.trim()) {
        result.innerText = "พิมพ์ก่อนน้าา 🥺";
        return;
    }

    result.innerText = "กำลังส่งข้อความ... 💌";

    fetch(scriptURL, {
        method: "POST",
        body: new URLSearchParams({
            message: msg
        })
    })
    .then(response => response.json())
    .then(data => {
        result.innerText = "💖 ข้อความถึงมอสแล้วนะ 💌";
        document.getElementById("msg").value = "";
        createHearts(15);
    })
    .catch(error => {
        result.innerText = "ส่งไม่สำเร็จ ลองอีกครั้งนะ 🥺";
    });
}

function createHearts(amount) {
    for (let i = 0; i < amount; i++) {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerText = "💖";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 22 + 16) + "px";
        heart.style.animationDelay = Math.random() * 1.2 + "s";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 6500);
    }
}

function createConfetti() {
    const emojis = ["🎉", "✨", "💘", "🌸", "💕", "🎁"];

    for (let i = 0; i < 45; i++) {
        const confetti = document.createElement("div");
        confetti.className = "confetti";
        confetti.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.fontSize = (Math.random() * 18 + 16) + "px";
        confetti.style.animationDelay = Math.random() * 1.4 + "s";
        document.body.appendChild(confetti);

        setTimeout(() => confetti.remove(), 4200);
    }
}
</script>

</body>
</html>

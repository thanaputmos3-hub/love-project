<!DOCTYPE html>
<html>
<head>
    <title>Gift For You 🎁</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(180deg, #ffe6f0, #fff7fb);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .box {
            background: white;
            width: 360px;
            padding: 30px;
            border-radius: 28px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(255, 77, 166, 0.25);
            position: relative;
            z-index: 2;
        }

        h1 {
            color: #ff4da6;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            font-size: 18px;
        }

        .gift {
            font-size: 90px;
            cursor: pointer;
            animation: bounce 1.2s infinite;
            margin: 20px 0;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .gift.opened {
            animation: openGift 0.7s ease forwards;
        }

        @keyframes openGift {
            0% { transform: scale(1) rotate(0deg); }
            40% { transform: scale(1.2) rotate(-10deg); }
            70% { transform: scale(1.1) rotate(10deg); }
            100% { transform: scale(0); opacity: 0; }
        }

        .hidden {
            display: none;
        }

        textarea {
            width: 100%;
            height: 110px;
            border-radius: 18px;
            border: 1px solid #ffcce0;
            padding: 12px;
            font-family: 'Kanit', sans-serif;
            font-size: 16px;
            resize: none;
            outline: none;
            box-sizing: border-box;
            margin-top: 12px;
        }

        button {
            background: #ff80bf;
            border: none;
            padding: 12px 24px;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            font-family: 'Kanit', sans-serif;
        }

        button:hover {
            background: #ff4da6;
        }

        #status {
            color: #ff4da6;
            font-weight: bold;
            margin-top: 14px;
        }

        .heart {
            position: absolute;
            bottom: -30px;
            font-size: 24px;
            animation: floatUp 4s linear forwards;
            z-index: 1;
        }

        @keyframes floatUp {
            from {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            to {
                transform: translateY(-110vh) scale(1.7);
                opacity: 0;
            }
        }

        .confetti {
            position: absolute;
            top: -10px;
            font-size: 20px;
            animation: fall 3s linear forwards;
            z-index: 1;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

<div class="box">
    <div id="start">
        <h1>มีของขวัญให้เธอ 🎁</h1>
        <p>ลองกดเปิดดูสิ...</p>
        <div class="gift" id="gift" onclick="openGift()">🎁</div>
    </div>

    <div id="message" class="hidden">
        <h1>เป็นกำลังใจให้คุณพิมมนะครับ 💖</h1>
        <p>
            คนที่น่ารักของผมม 🥺💕
        </p>

        <textarea id="reply" placeholder="ส่งความรู้สึกได้น้าาา..."></textarea>
        <button onclick="sendReply()">ส่งความในใจ 💌</button>

        <p id="status"></p>
    </div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycby-mVTd2PO-M75JWh9d11XCnKu506mfSnebB55OaiyUPXx5wHH8pW8caIGujqDNQS-4ZA/exec";

function openGift() {
    const gift = document.getElementById("gift");
    gift.classList.add("opened");

    createHearts();
    createConfetti();

    setTimeout(() => {
        document.getElementById("start").classList.add("hidden");
        document.getElementById("message").classList.remove("hidden");
    }, 700);
}

function createHearts() {
    for (let i = 0; i < 25; i++) {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "💖";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDelay = Math.random() * 1.5 + "s";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 4500);
    }
}

function createConfetti() {
    const emojis = ["🎉", "✨", "💘", "🌸", "💕"];

    for (let i = 0; i < 35; i++) {
        const confetti = document.createElement("div");
        confetti.className = "confetti";
        confetti.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.animationDelay = Math.random() * 1.5 + "s";
        document.body.appendChild(confetti);

        setTimeout(() => {
            confetti.remove();
        }, 4000);
    }
}

function sendReply() {
    const reply = document.getElementById("reply").value;
    const status = document.getElementById("status");

    if (reply.trim() === "") {
        status.innerHTML = "พิมพ์ก่อนน้า 🥺";
        return;
    }

    status.innerHTML = "กำลังส่งคำตอบ... 💌";

    fetch(scriptURL, {
        method: "POST",
        body: JSON.stringify({ reply: reply })
    })
    .then(response => response.json())
    .then(data => {
        status.innerHTML = "คำตอบของคุณได้ส่งถึงมอสแล้ว 💕";
        document.getElementById("reply").value = "";
    })
    .catch(error => {
        status.innerHTML = "ส่งไม่สำเร็จ ลองอีกครั้งนะ 🥺";
    });
}
</script>

</body>
</html>
